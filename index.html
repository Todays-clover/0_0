  <!-- 둥근 감성 폰트 -->
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Jua', sans-serif;
      background: linear-gradient(135deg, #d9fbe8, #bff3dd);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* 🌿 상단 제목 */
    .title {
      position: absolute;
      top: 28px;
      font-size: 30px;
      color: #2e7d32;
    }

    /* 🌿 운세 카드 */
    .fortune-box {
      width: 330px;
      height: 240px;
      background: #fff;

      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;

      padding: 30px;
      box-sizing: border-box;

      border-radius: 25px;
      border: 2px solid #2e7d32;
      box-shadow: 0 10px 22px rgba(0,0,0,0.08);
    }

    /* 🌿 운세 글씨 + 스르르 효과 */
    #fortune {
      font-size: 19px;
      color: #2f4f4f;
      line-height: 1.6;
      max-width: 260px;

      opacity: 0;
      transform: translateY(10px);
      transition: all 0.8s ease;
    }

    #fortune.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* 🌿 오른쪽 하단 */
    .footer {
      position: absolute;
      bottom: 15px;
      right: 20px;
      font-size: 12px;
      color: rgba(0,0,0,0.35);
    }

    /* 🌿 떠다니는 클로버 */
    .bg {
      position: absolute;
      font-size: 22px;
      opacity: 0.15;
      animation: float 12s linear infinite;
    }

    @keyframes float {
      from { transform: translateY(100vh); }
      to { transform: translateY(-10vh); }
    }
  </style>
</head>
